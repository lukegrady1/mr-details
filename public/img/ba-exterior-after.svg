  <path d="M60 430 C280 354 560 348 750 420" stroke="#ec6a1a" stroke-width="5" fill="none" opacity="0.9"/>
  <path d="M80 470 C300 404 540 400 720 458" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.25"/>
  <!-- water beads -->
  <circle cx="220" cy="380" r="5" fill="#ffffff" opacity="0.7"/>
  <circle cx="520" cy="372" r="4" fill="#ffffff" opacity="0.6"/>
  <!-- door handle -->
