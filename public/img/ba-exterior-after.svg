<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Placeholder: deep glossy car paint after detailing">
  <defs>
    <linearGradient id="xaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1916"/><stop offset="1" stop-color="#0d0d0b"/>
    </linearGradient>
    <linearGradient id="xpaint" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a352c"/><stop offset="0.5" stop-color="#0a0a08"/><stop offset="1" stop-color="#000"/>
