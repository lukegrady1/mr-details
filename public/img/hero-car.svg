  <path d="M260 690 C620 640 1040 632 1420 692" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.25"/>
  <!-- wheels -->
  <circle cx="540" cy="760" r="78" fill="#0a0a08"/>
  <circle cx="540" cy="760" r="40" fill="#2b2722"/>
  <circle cx="1120" cy="760" r="78" fill="#0a0a08"/>
  <circle cx="1120" cy="760" r="40" fill="#2b2722"/>
