<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Placeholder: glossy detailed car at dusk">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d0d0b"/>
      <stop offset="0.55" stop-color="#1a1916"/>
      <stop offset="1" stop-color="#26221b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.35" r="0.6">
      <stop offset="0" stop-color="#ec6a1a" stop-opacity="0.55"/>
      <stop offset="0.4" stop-color="#c9560f" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#1a1916" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b2722"/>
      <stop offset="0.5" stop-color="#14130f"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#sky)"/>
  <rect width="1600" height="1000" fill="url(#glow)"/>
  <!-- ground reflection -->
  <rect y="720" width="1600" height="280" fill="#000000" opacity="0.45"/>
