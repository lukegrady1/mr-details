<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 560" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Stylised map of the South Shore service area">
  <rect width="600" height="560" fill="#fce6cf"/>
  <!-- bay / water -->
  <path d="M600 60 C470 90 430 200 470 300 C500 380 560 440 600 470 L600 560 L600 60 Z" fill="#f3d3b2"/>
  <!-- coastline -->
  <path d="M60 40 C150 70 250 60 330 110 C420 165 380 280 300 330 C230 372 250 470 180 520"
        fill="none" stroke="#1a1916" stroke-width="3" stroke-dasharray="2 10" stroke-linecap="round" opacity="0.5"/>
  <!-- service radius -->
  <circle cx="250" cy="300" r="180" fill="#ec6a1a" opacity="0.12"/>
  <circle cx="250" cy="300" r="180" fill="none" stroke="#ec6a1a" stroke-width="2" stroke-dasharray="6 8"/>
  <!-- town pins -->
  <g fill="#1a1916">
    <g transform="translate(250 300)"><path d="M0 -34 a16 16 0 0 1 16 16 c0 14 -16 28 -16 28 c0 0 -16 -14 -16 -28 a16 16 0 0 1 16 -16 z" fill="#ec6a1a"/><circle cy="-18" r="6" fill="#1a1916"/></g>
    <g transform="translate(170 230)"><circle r="7"/></g>
    <g transform="translate(330 250)"><circle r="7"/></g>
    <g transform="translate(300 380)"><circle r="7"/></g>
    <g transform="translate(190 400)"><circle r="7"/></g>
  </g>
  <text x="250" y="500" text-anchor="middle" font-family="sans-serif" font-size="22" letter-spacing="3" fill="#1a1916" font-weight="700">SOUTH SHORE, MA</text>
</svg>
